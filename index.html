<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMINE Bot Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Orbitron', monospace;
            background: #0a1628;
            min-height: 100vh;
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
        }
        .container { max-width: 1300px; margin:0 auto; padding:20px; }
        
        /* HEADER */
        .header {
            display:flex; justify-content:space-between; align-items:center;
            padding:18px 30px; background:rgba(255,255,255,0.02);
            border:1px solid rgba(96,165,250,0.06); border-radius:18px;
            backdrop-filter:blur(20px); margin-bottom:30px;
        }
        .header .logo {
            font-size:20px; font-weight:900;
            background:linear-gradient(135deg,#93c5fd,#818cf8,#60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            text-shadow: 0 0 60px rgba(96,165,250,0.06);
        }
        .header .logo span { font-weight:400; -webkit-text-fill-color:rgba(147,197,253,0.12); font-size:11px; }
        .header .user-actions { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
        .header .user-actions .username { font-size:11px; color:rgba(147,197,253,0.25); text-shadow: 0 0 20px rgba(96,165,250,0.04); }
        
        .btn {
            padding:10px 20px; border:1px solid rgba(96,165,250,0.08);
            border-radius:12px; background:rgba(96,165,250,0.02);
            color:#93c5fd; font-family:'Orbitron',monospace; font-size:11px;
            cursor:pointer; transition:all 0.3s ease; text-decoration:none;
            display:inline-block; text-align:center; text-shadow: 0 0 20px rgba(96,165,250,0.04);
        }
        .btn:hover { background:rgba(96,165,250,0.06); box-shadow:0 0 40px rgba(59,130,246,0.02); }
        .btn-danger { border-color:rgba(255,0,80,0.10); color:#f472b6; }
        .btn-danger:hover { background:rgba(255,0,80,0.04); }
        .btn-primary { border-color:rgba(96,165,250,0.12); background:rgba(96,165,250,0.04); }
        .btn-primary:hover { background:rgba(96,165,250,0.08); }
        .btn-success { border-color:rgba(0,255,180,0.10); color:#6ee7b7; }
        .btn-success:hover { background:rgba(0,255,180,0.03); }
        .btn-purple { border-color:rgba(180,0,255,0.10); color:#c084fc; }
        .btn-purple:hover { background:rgba(180,0,255,0.03); }

        /* GRID */
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:25px; }
        .card {
            background:rgba(255,255,255,0.015); border:1px solid rgba(96,165,250,0.04);
            border-radius:18px; padding:25px; backdrop-filter:blur(10px);
            transition:all 0.4s ease; position:relative; overflow:hidden;
        }
        .card:hover { border-color:rgba(96,165,250,0.07); }
        .card h3 {
            font-size:12px; color:rgba(147,197,253,0.2);
            letter-spacing:2px; text-transform:uppercase; margin-bottom:15px;
            text-shadow: 0 0 20px rgba(96,165,250,0.04);
        }
        .input-field {
            width:100%; padding:14px 16px;
            background:rgba(255,255,255,0.015); border:1px solid rgba(96,165,250,0.04);
            border-radius:12px; color:#bfdbfe; font-family:'Orbitron',monospace;
            font-size:12px; transition:all 0.3s; margin-top:6px;
            text-shadow: 0 0 20px rgba(96,165,250,0.04);
        }
        .input-field:focus { outline:none; border-color:rgba(96,165,250,0.12); }
        .input-field::placeholder { color:rgba(147,197,253,0.06); }
        .flex-row { display:flex; gap:12px; flex-wrap:wrap; margin-top:10px; }
        .flex-row .btn { flex:1; min-width:70px; text-align:center; }

        /* PLAYER INFO */
        .info-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius:14px; padding:20px; margin-top:12px;
            border:1px solid rgba(255,255,255,0.04);
        }
        .info-card .info-row {
            display:flex; justify-content:space-between; padding:10px 0;
            border-bottom:1px solid rgba(255,255,255,0.03);
        }
        .info-card .info-row:last-child { border-bottom:none; }
        .info-card .info-label {
            color: rgba(148,163,184,0.5); font-size:11px; letter-spacing:1px;
        }
        .info-card .info-value {
            color: #ffffff; font-size:13px; font-weight:700;
            text-shadow: 0 0 20px rgba(255,255,255,0.04);
        }
        .info-card .info-value.highlight { color: #60a5fa; }
        .info-card .info-value.gold { color: #fbbf24; }
        .info-empty {
            color:rgba(147,197,253,0.2); font-size:12px; text-align:center; padding:30px 0;
        }

        /* ===== LARGE TOAST ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay 0.3s ease;
        }
        .toast-overlay.show { display: flex; }
        @keyframes fadeInOverlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .toast-box {
            background: rgba(10, 22, 40, 0.95);
            border: 1px solid rgba(96, 165, 250, 0.12);
            border-radius: 24px;
            padding: 45px 55px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .toast-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(59, 130, 246, 0.03), transparent, rgba(99, 102, 241, 0.03), transparent);
            animation: spinGlow 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .toast-box .toast-icon { font-size: 48px; margin-bottom: 15px; display: block; }
        .toast-box .toast-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #bfdbfe;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(96, 165, 250, 0.06);
        }
        .toast-box .toast-message {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: rgba(147, 197, 253, 0.5);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .toast-box .toast-btn {
            padding: 12px 40px;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(96, 165, 250, 0.10);
            border-radius: 14px;
            color: #93c5fd;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            min-width: 120px;
        }
        .toast-box .toast-btn:hover {
            background: rgba(59, 130, 246, 0.12);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.03);
            transform: scale(1.02);
        }
        .toast-box.success .toast-title { color: #6ee7b7; text-shadow: 0 0 40px rgba(0, 255, 180, 0.06); }
        .toast-box.success .toast-icon { filter: drop-shadow(0 0 30px rgba(0, 255, 180, 0.10)); }
        .toast-box.error .toast-title { color: #f472b6; text-shadow: 0 0 40px rgba(255, 0, 80, 0.06); }
        .toast-box.error .toast-icon { filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.10)); }
        .toast-box.info .toast-title { color: #93c5fd; text-shadow: 0 0 40px rgba(96, 165, 250, 0.06); }
        .toast-box.info .toast-icon { filter: drop-shadow(0 0 30px rgba(96, 165, 250, 0.10)); }

        .logs-box {
            max-height:120px; overflow-y:auto; margin-top:10px;
            background:rgba(0,0,0,0.15); border-radius:12px; padding:12px;
            font-size:10px; color:rgba(147,197,253,0.15); font-family:monospace;
            line-height:1.8;
        }
        .logs-box .log-line { border-bottom:1px solid rgba(96,165,250,0.02); padding:2px 0; }
        .logs-box .log-line .time { color:rgba(147,197,253,0.08); }
        .logs-box .log-line .highlight { color:rgba(147,197,253,0.3); }

        .vip-list { max-height:100px; overflow-y:auto; margin-top:10px; }
        .vip-list .item {
            display:flex; justify-content:space-between; align-items:center;
            padding:6px 0; border-bottom:1px solid rgba(96,165,250,0.02);
            font-size:11px; color:rgba(147,197,253,0.15);
        }
        .vip-list .item .id { color:rgba(147,197,253,0.4); }
        .vip-list .item .del { color:rgba(255,0,80,0.12); cursor:pointer; }
        .vip-list .item .del:hover { color:#f472b6; }

        .footer-links {
            display:flex; justify-content:center; gap:12px;
            margin-top:30px; padding:15px;
            border-top:1px solid rgba(96,165,250,0.02);
            flex-wrap:wrap;
        }
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            color: rgba(147, 197, 253, 0.10);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .footer-links a:hover {
            color: rgba(147, 197, 253, 0.35);
        }
        .footer-links a .platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .footer-links a .platform-icon svg {
            width: 100%;
            height: 100%;
        }
        .footer-links .link-youtube:hover {
            border-color: rgba(255, 0, 0, 0.10);
            background: rgba(255, 0, 0, 0.02);
            color: #ff6b6b;
        }
        .footer-links .link-telegram:hover {
            border-color: rgba(0, 136, 204, 0.10);
            background: rgba(0, 136, 204, 0.02);
            color: #4fc3f7;
        }

        @media (max-width:850px) {
            .grid-2 { grid-template-columns:1fr; }
            .header { flex-direction:column; gap:12px; text-align:center; }
            .header .user-actions { justify-content:center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <div class="header">
            <div class="logo">⚡ AMINE <span>Bot Manager · v.ω.18</span></div>
            <div class="user-actions">
                <span class="username">👤 {{ username }}</span>
                {% if role == 'admin' %}
                <a href="/admin" class="btn btn-primary">👑 ADMIN</a>
                {% endif %}
                <button class="btn btn-danger" onclick="logout()">🚪</button>
            </div>
        </div>

        <!-- ROW 1 -->
        <div class="grid-2">
            <!-- SPAM -->
            <div class="card">
                <h3>🔥 محرك السبام</h3>
                <div>
                    <label style="font-size:11px; color:rgba(147,197,253,0.12);">🎯 UID الهدف</label>
                    <input type="text" id="targetUid" class="input-field" placeholder="مثال: 5364803546">
                </div>
                <div class="flex-row">
                    <button class="btn btn-primary" onclick="spamStart()">▶ START</button>
                    <button class="btn btn-danger" onclick="spamStop()">⏹ STOP</button>
                </div>
                <div id="spamStatus" style="margin-top:12px; font-size:11px; color:rgba(147,197,253,0.12);">⚪ جاهز</div>
            </div>

            <!-- VIP -->
            <div class="card">
                <h3>👑 VIP Bot</h3>
                <div>
                    <label style="font-size:11px; color:rgba(147,197,253,0.12);">🎯 Player ID</label>
                    <input type="text" id="vipPlayerId" class="input-field" placeholder="أدخل ID اللاعب">
                </div>
                <div class="flex-row">
                    <button class="btn btn-success" onclick="vipAdd()">➕ إضافة</button>
                    <button class="btn btn-danger" onclick="vipRemove()">➖ حذف</button>
                    <button class="btn" onclick="vipList()">📋 قائمة</button>
                </div>
                <div id="vipStatus" style="margin-top:12px; font-size:11px; color:rgba(147,197,253,0.12);"></div>
                <div class="vip-list" id="vipListContainer"></div>
            </div>
        </div>

        <!-- ROW 2 -->
        <div class="grid-2" style="margin-top:25px;">
            <!-- INFO -->
            <div class="card">
                <h3>📊 معلومات اللاعب</h3>
                <div class="flex-row">
                    <input type="text" id="infoUid" class="input-field" placeholder="UID" style="flex:1;">
                    <button class="btn btn-purple" onclick="getInfo()">🔍 بحث</button>
                </div>
                <div id="infoResult">
                    <div class="info-empty">🔍 أدخل UID للبحث عن اللاعب</div>
                </div>
            </div>

            <!-- LOGS -->
            <div class="card">
                <h3>📜 السجلات</h3>
                <div style="display:flex; gap:12px; align-items:center; margin-bottom:10px;">
                    <button class="btn" onclick="loadLogs()">🔄 تحديث</button>
                </div>
                <div class="logs-box" id="logsContent">
                    <div class="log-line"><span class="time">[System]</span> <span class="highlight">جاري التحميل...</span></div>
                </div>
            </div>
        </div>

        <!-- FOOTER -->
        <div class="footer-links">
            <a href="https://youtube.com/@stravexgm?si=JfbKlk1iBUGhR4l4" target="_blank" class="link-youtube">
                <span class="platform-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z" fill="#FF0000"/>
                        <path d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="white"/>
                    </svg>
                </span>
                STRAVEX GM
            </a>
            <a href="https://t.me/xAMiNE_Core" target="_blank" class="link-telegram">
                <span class="platform-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/>
                    </svg>
                </span>
                AMINE Core
            </a>
            <a href="https://t.me/stravex_oficiel" target="_blank" class="link-telegram">
                <span class="platform-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/>
                    </svg>
                </span>
                STRAVEX Official
            </a>
        </div>
    </div>

    <!-- TOAST OVERLAY -->
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box" id="toastBox">
            <span class="toast-icon" id="toastIcon">ℹ️</span>
            <div class="toast-title" id="toastTitle">تنبيه</div>
            <div class="toast-message" id="toastMessage">رسالة</div>
            <button class="toast-btn" onclick="closeToast()">OK</button>
        </div>
    </div>

    <script>
        // ===== LARGE TOAST =====
        function showToast(message, type = 'info', title = '') {
            const overlay = document.getElementById('toastOverlay');
            const icon = document.getElementById('toastIcon');
            const titleEl = document.getElementById('toastTitle');
            const msgEl = document.getElementById('toastMessage');
            const box = document.getElementById('toastBox');

            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            const titles = { success: title || 'نجاح', error: title || 'فشل', info: title || 'تنبيه' };

            icon.textContent = icons[type] || 'ℹ️';
            titleEl.textContent = titles[type] || 'تنبيه';
            msgEl.textContent = message;
            box.className = 'toast-box ' + type;

            overlay.classList.add('show');
        }

        function closeToast() {
            document.getElementById('toastOverlay').classList.remove('show');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeToast();
        });

        // ===== SPAM =====
        async function spamStart() {
            const uid = document.getElementById('targetUid').value.trim();
            if (!uid) { showToast('أدخل UID الهدف', 'error', '⚠️ تنبيه'); return; }
            try {
                const res = await fetch('/api/spam/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(`تم بدء السبام على ${uid}`, 'success', '✅ تم التنفيذ');
                    document.getElementById('spamStatus').textContent = `🟢 جاري السبام على ${uid}`;
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function spamStop() {
            const uid = document.getElementById('targetUid').value.trim();
            if (!uid) { showToast('أدخل UID', 'error', '⚠️ تنبيه'); return; }
            try {
                const res = await fetch('/api/spam/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(`تم إيقاف السبام على ${uid}`, 'info', '⏹ تم الإيقاف');
                    document.getElementById('spamStatus').textContent = '⚪ متوقف';
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        // ===== VIP =====
        async function vipAdd() {
            const playerId = document.getElementById('vipPlayerId').value.trim();
            if (!playerId) { showToast('أدخل Player ID', 'error', '⚠️ تنبيه'); return; }
            try {
                const res = await fetch('/api/vip/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_id: playerId })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(data.message, 'success', '✅ تم التنفيذ');
                    document.getElementById('vipStatus').textContent = `✅ تم إضافة ${playerId}`;
                    vipList();
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function vipRemove() {
            const playerId = document.getElementById('vipPlayerId').value.trim();
            if (!playerId) { showToast('أدخل Player ID', 'error', '⚠️ تنبيه'); return; }
            try {
                const res = await fetch('/api/vip/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_id: playerId })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(data.message, 'info', '✅ تم التنفيذ');
                    document.getElementById('vipStatus').textContent = `✅ تم حذف ${playerId}`;
                    vipList();
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function vipList() {
            try {
                const res = await fetch('/api/vip/list');
                const data = await res.json();
                const container = document.getElementById('vipListContainer');
                if (data.count === 0) {
                    container.innerHTML = '<div style="color:rgba(147,197,253,0.06); font-size:11px;">لا يوجد بوتات VIP</div>';
                    return;
                }
                container.innerHTML = data.vips.map(v => 
                    `<div class="item"><span class="id">👑 ${v.player_id}</span><span style="font-size:9px; color:rgba(147,197,253,0.08);">${v.uid}</span></div>`
                ).join('');
                showToast(`${data.count} بوت VIP نشط`, 'info', '📋 قائمة');
            } catch { showToast('خطأ في جلب القائمة', 'error', '❌ فشل'); }
        }

        // ===== INFO =====
        async function getInfo() {
            const uid = document.getElementById('infoUid').value.trim();
            const container = document.getElementById('infoResult');
            if (!uid) { showToast('أدخل UID', 'error', '⚠️ تنبيه'); return; }
            try {
                const res = await fetch(`/api/info?uid=${uid}`);
                const data = await res.json();
                if (data.status === 'success' && data.data) {
                    const d = data.data;
                    container.innerHTML = `
                        <div class="info-card">
                            <div class="info-row">
                                <span class="info-label">🆔 UID</span>
                                <span class="info-value highlight">${d.uid || uid}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">👤 الاسم</span>
                                <span class="info-value">${d.name || d.nickname || 'غير معروف'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">⭐ المستوى</span>
                                <span class="info-value gold">${d.level || d.lv || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">📊 الخبرة</span>
                                <span class="info-value">${d.exp || d.experience || 'N/A'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">🏆 الرتبة</span>
                                <span class="info-value highlight">${d.rank || d.tier || 'غير محدد'}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">🌍 السيرفر</span>
                                <span class="info-value">${d.server || d.region || 'N/A'}</span>
                            </div>
                            ${d.clan ? `<div class="info-row"><span class="info-label">🏴 العشيرة</span><span class="info-value">${d.clan}</span></div>` : ''}
                            ${d.kills !== undefined ? `<div class="info-row"><span class="info-label">💀 القتلى</span><span class="info-value">${d.kills}</span></div>` : ''}
                            ${d.wins !== undefined ? `<div class="info-row"><span class="info-label">🏅 الانتصارات</span><span class="info-value">${d.wins}</span></div>` : ''}
                        </div>
                    `;
                    showToast(`تم جلب معلومات ${uid}`, 'success', '✅ نجاح');
                } else {
                    container.innerHTML = `<div class="info-empty">⚠️ ${data.message || 'لم يتم العثور على اللاعب'}</div>`;
                    showToast(data.message || 'لم يتم العثور على اللاعب', 'error', '❌ فشل');
                }
            } catch {
                container.innerHTML = '<div class="info-empty">❌ خطأ في الاتصال بالخادم</div>';
                showToast('خطأ في الاتصال', 'error', '❌ فشل');
            }
        }

        // ===== LOGS =====
        async function loadLogs() {
            const container = document.getElementById('logsContent');
            try {
                const res = await fetch('/api/user/logs');
                const data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    container.innerHTML = data.logs.map(l => `<div class="log-line">${l}</div>`).join('');
                } else {
                    container.innerHTML = `<div class="log-line"><span class="time">[System]</span> <span class="highlight">لا توجد سجلات</span></div>`;
                }
            } catch {
                container.innerHTML = `<div class="log-line"><span class="time">[Error]</span> فشل التحميل</div>`;
            }
        }

        // ===== LOGOUT =====
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // ===== INIT =====
        loadLogs();
        vipList();
        setInterval(loadLogs, 30000);
    </script>
</body>
</html>
