<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F7M Bot Manager · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0a12;
            overflow: hidden;
        }
        /* Floating Orbs */
        .login-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .login-orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 240, 255, 0.08);
            top: -100px; left: -100px;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .login-orb-2 {
            width: 500px; height: 500px;
            background: rgba(255, 34, 255, 0.06);
            bottom: -150px; right: -150px;
            animation: orbFloat 25s ease-in-out infinite alternate-reverse;
        }
        .login-orb-3 {
            width: 300px; height: 300px;
            background: rgba(0, 255, 136, 0.05);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat 30s ease-in-out infinite alternate;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.2); }
        }
        /* Particles Canvas */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 24px;
            padding: 45px 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 60px rgba(0, 240, 255, 0.03);
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-box .logo h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff, #0066ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 60px rgba(0, 240, 255, 0.1);
        }
        .login-box .logo .sub {
            font-size: 11px;
            color: rgba(0, 240, 255, 0.15);
            letter-spacing: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .login-box .logo .sub span {
            color: rgba(0, 240, 255, 0.25);
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: rgba(0, 240, 255, 0.2);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 240, 255, 0.06);
            border-radius: 14px;
            color: #b0f0ff;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            transition: all 0.4s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: rgba(0, 240, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 240, 255, 0.03);
        }
        .form-group input::placeholder {
            color: rgba(0, 240, 255, 0.08);
            font-size: 12px;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.12), rgba(0, 102, 255, 0.06));
            border: 1px solid rgba(0, 240, 255, 0.12);
            border-radius: 14px;
            color: #00f0ff;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.06);
        }
        .login-btn:hover {
            background: rgba(0, 240, 255, 0.18);
            box-shadow: 0 0 60px rgba(0, 240, 255, 0.05);
            transform: translateY(-2px);
        }
        .login-btn:active { transform: translateY(0px); }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            color: rgba(0, 240, 255, 0.10);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .footer-links a:hover {
            color: rgba(0, 240, 255, 0.35);
        }
        .footer-links a .platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .footer-links a .platform-icon svg {
            width: 100%;
            height: 100%;
        }
        .footer-links .link-youtube:hover {
            border-color: rgba(255, 0, 0, 0.10);
            background: rgba(255, 0, 0, 0.02);
            color: #ff6b6b;
        }
        .footer-links .link-telegram:hover {
            border-color: rgba(0, 136, 204, 0.10);
            background: rgba(0, 136, 204, 0.02);
            color: #4fc3f7;
        }

        /* ===== LARGE TOAST ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay 0.3s ease;
        }
        .toast-overlay.show { display: flex; }
        @keyframes fadeInOverlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .toast-box {
            background: rgba(10, 22, 40, 0.95);
            border: 1px solid rgba(0, 240, 255, 0.10);
            border-radius: 24px;
            padding: 45px 55px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .toast-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 240, 255, 0.03), transparent, rgba(0, 102, 255, 0.03), transparent);
            animation: spinGlow 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .toast-box .toast-icon { font-size: 48px; margin-bottom: 15px; display: block; }
        .toast-box .toast-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #b0f0ff;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.06);
        }
        .toast-box .toast-message {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: rgba(0, 240, 255, 0.5);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .toast-box .toast-btn {
            padding: 12px 40px;
            background: rgba(0, 240, 255, 0.08);
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 14px;
            color: #00f0ff;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            min-width: 120px;
        }
        .toast-box .toast-btn:hover {
            background: rgba(0, 240, 255, 0.12);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.03);
            transform: scale(1.02);
        }
        .toast-box.loading .toast-icon {
            animation: spinLoader 1s linear infinite;
        }
        @keyframes spinLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast-box.success .toast-title { color: #6ee7b7; text-shadow: 0 0 40px rgba(0, 255, 180, 0.06); }
        .toast-box.success .toast-icon { filter: drop-shadow(0 0 30px rgba(0, 255, 180, 0.10)); }
        .toast-box.error .toast-title { color: #f472b6; text-shadow: 0 0 40px rgba(255, 0, 80, 0.06); }
        .toast-box.error .toast-icon { filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.10)); }
        .toast-box.info .toast-title { color: #00f0ff; text-shadow: 0 0 40px rgba(0, 240, 255, 0.06); }
        .toast-box.info .toast-icon { filter: drop-shadow(0 0 30px rgba(0, 240, 255, 0.10)); }
    </style>
</head>
<body>
    <!-- Floating Orbs -->
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
    <div class="login-orb login-orb-3"></div>
    <!-- Particles Canvas -->
    <canvas id="bg-canvas"></canvas>

    <div class="login-wrapper">
        <div class="login-box">

                </div>
                <button type="submit" class="login-btn">🚀 دخول</button>
            </form>

            <div class="footer-links">

                    <span class="platform-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/></svg></span>

            </div>
        </div>
    </div>

    <!-- TOAST OVERLAY -->
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box" id="toastBox">
            <span class="toast-icon" id="toastIcon">ℹ️</span>
            <div class="toast-title" id="toastTitle">تنبيه</div>
            <div class="toast-message" id="toastMessage">رسالة</div>
            <button class="toast-btn" onclick="closeToast()">OK</button>
        </div>
    </div>

    <script>
        // ===== CANVAS PARTICLES =====
        (function() {
            var canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var particles = [];
            var COUNT = 50;
            var CONN_DIST = 120;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            var accent = '#00f0ff';
            function hexToRgba(hex, alpha) {
                var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
            }
            for (var i = 0; i < COUNT; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
                    r: Math.random() * 2.5 + 1, alpha: Math.random() * 0.4 + 0.1
                });
            }
            var animId;
            function draw() {
                if (!canvas || !canvas.getContext) { if (animId) cancelAnimationFrame(animId); return; }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = hexToRgba(accent, p.alpha);
                    ctx.fill();
                    for (var j = i + 1; j < particles.length; j++) {
                        var p2 = particles[j];
                        var dx = p.x - p2.x, dy = p.y - p2.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONN_DIST) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = hexToRgba(accent, (1 - dist / CONN_DIST) * 0.2);
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
        })();

        // ===== LARGE TOAST =====
        function showToast(message, type = 'info', title = '', showOk = true) {
            var overlay = document.getElementById('toastOverlay');
            var icon = document.getElementById('toastIcon');
            var titleEl = document.getElementById('toastTitle');
            var msgEl = document.getElementById('toastMessage');
            var box = document.getElementById('toastBox');
            var btn = box.querySelector('.toast-btn');

            var icons = { success: '✅', error: '❌', info: 'ℹ️', loading: '⏳' };
            var titles = { success: title || 'نجاح', error: title || 'فشل', info: title || 'تنبيه', loading: title || 'جاري التنفيذ' };

            icon.textContent = icons[type] || 'ℹ️';
            titleEl.textContent = titles[type] || 'تنبيه';
            msgEl.textContent = message;
            box.className = 'toast-box ' + type;
            
            if (type === 'loading') {
                btn.style.display = 'none';
                box.classList.add('loading');
            } else {
                btn.style.display = 'inline-block';
                box.classList.remove('loading');
                if (!showOk) btn.style.display = 'none';
            }

            overlay.classList.add('show');
        }

        function closeToast() {
            document.getElementById('toastOverlay').classList.remove('show');
        }

        // ===== LOGIN =====
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            var username = document.getElementById('username').value.trim();
            var password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showToast('يرجى ملء جميع الحقول', 'error', '⚠️ تنبيه');
                return;
            }

            showToast('جاري التحقق من البيانات...', 'loading', '⏳ جاري التنفيذ');

            try {
                var res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                var data = await res.json();
                closeToast();
                if (res.ok) {
                    showToast('تم تسجيل الدخول بنجاح', 'success', '✅ تم التنفيذ');
                    setTimeout(function() { window.location.href = '/'; }, 1500);
                } else {
                    showToast(data.error || 'المستخدم غير موجود', 'error', '❌ فشل الدخول');
                }
            } catch (err) {
                closeToast();
                showToast('خطأ في الاتصال بالخادم', 'error', '❌ فشل الدخول');
            }
        });
    </script>
</body>
