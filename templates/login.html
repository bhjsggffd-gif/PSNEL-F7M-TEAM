<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Login - S1X TEAM HOST</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; }
    
    .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 30%, #0a2a1a, #050505); z-index: -2; }
    .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
    .particle { position: absolute; background: rgba(0,255,136,0.15); border-radius: 50%; animation: float 15s infinite linear; }
    @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 15% { opacity: 0.6; } 85% { opacity: 0.6; } 100% { transform: translateY(-100vh); opacity: 0; } }
    
    .login-container { width: 100%; max-width: 400px; padding: 20px; margin: 20px; }
    .login-card { background: rgba(10,12,16,0.9); backdrop-filter: blur(20px); border-radius: 40px; padding: 40px 32px; border: 1px solid rgba(0,255,136,0.2); animation: slideUp 0.5s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    
    .logo-icon { width: 60px; height: 60px; background: linear-gradient(135deg, #00ff88, #00994d); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; margin: 0 auto 20px; }
    .login-card h2 { color: #fff; text-align: center; font-size: 1.5rem; margin-bottom: 8px; }
    .login-card p { color: #6c757d; text-align: center; font-size: 0.75rem; margin-bottom: 30px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; color: #00ff88; font-size: 0.65rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #4a5568; }
    .input-wrapper input { width: 100%; padding: 12px 14px 12px 44px; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,255,136,0.2); border-radius: 14px; color: #fff; font-size: 0.85rem; outline: none; }
    .input-wrapper input:focus { border-color: #00ff88; }
    
    .error { background: rgba(255,59,92,0.1); border: 1px solid #ff3b5c; border-radius: 12px; padding: 10px; margin-bottom: 20px; color: #ff6b8a; font-size: 0.75rem; display: flex; align-items: center; gap: 8px; }
    
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00ff88, #00994d); border: none; border-radius: 14px; color: #000; font-weight: 800; font-size: 0.9rem; cursor: pointer; }
    .login-btn:active { transform: scale(0.97); }
    
    .footer { text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
    .footer p { color: #6c757d; font-size: 0.7rem; margin-bottom: 8px; }
    .footer a { color: #00ff88; text-decoration: none; }
    .demo { background: rgba(0,255,136,0.05); border-radius: 12px; padding: 10px; margin-top: 16px; font-size: 0.65rem; text-align: center; color: #4a5568; }
    
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 10px; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="particles" id="particles"></div>

<div class="login-container">
    <div class="login-card">
        <div class="logo-icon"><i class="fas fa-dragon"></i></div>
        <h2>Welcome Back</h2>
        <p>Sign in to access your dashboard</p>
        
        {% if error %}
        <div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="input-group">
                <label>USERNAME</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" placeholder="Enter username" required autofocus/>
                </div>
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" placeholder="Enter password" required/>
                </div>
            </div>
            <button type="submit" class="login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
        
        <div class="footer">
            <p>Don't have an account? <a href="#" onclick="showContactModal()">Contact Admin</a></p>
            <div class="demo"><i class="fas fa-info-circle"></i> Demo: S1X TEAM / S1X TEAM12345</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    function createParticles() {
        const c=document.getElementById('particles');
        for(let i=0;i<40;i++){ const p=document.createElement('div'); p.className='particle'; p.style.width=(Math.random()*3+1)+'px'; p.style.height=p.style.width; p.style.left=Math.random()*100+'%'; p.style.animationDelay=Math.random()*15+'s'; p.style.animationDuration=(Math.random()*15+10)+'s'; c.appendChild(p); }
    }
    createParticles();
    function showContactModal() {
        Swal.fire({ title: 'Contact Admin', html: '<i class="fas fa-envelope"></i> admin@amin.host<br><i class="fab fa-whatsapp"></i> +213 541700591', background: '#0d1117', color: '#fff', confirmButtonColor: '#00ff88' });
    }
</script>
</body>
</html>
