<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F7M Bot Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Orbitron', monospace;
            background: #0a0a12;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(0, 100, 255, 0.08);
            top: -100px; left: -100px;
            animation: orbFloat 20s ease-in-out infinite alternate;
        }
        .orb-2 {
            width: 500px; height: 500px;
            background: rgba(255, 50, 80, 0.05);
            bottom: -150px; right: -150px;
            animation: orbFloat 25s ease-in-out infinite alternate-reverse;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: rgba(0, 50, 200, 0.04);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation: orbFloat 30s ease-in-out infinite alternate;
        }
        @keyframes orbFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.2); }
        }
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 30px;
            background: rgba(10, 10, 30, 0.6);
            border: 1px solid rgba(0, 150, 255, 0.06);
            border-radius: 18px;
            backdrop-filter: blur(20px);
            margin-bottom: 30px;
        }
        .header .logo {
            font-size: 20px; font-weight: 900;
            background: linear-gradient(135deg, #ff6b8a, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 60px rgba(0, 200, 255, 0.04);
        }
        .header .logo span {
            font-weight: 400;
            -webkit-text-fill-color: rgba(0, 200, 255, 0.10);
            font-size: 11px;
        }
        .header .user-actions {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
        }
        .header .user-actions .username {
            font-size: 11px;
            color: rgba(0, 200, 255, 0.25);
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.04);
            font-weight: 700;
        }
        
        .btn {
            padding: 10px 20px;
            border: 1px solid rgba(0, 150, 255, 0.06);
            border-radius: 12px;
            background: rgba(10, 10, 30, 0.4);
            color: #00d4ff;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.04);
            font-weight: 700;
        }
        .btn:hover {
            background: rgba(0, 100, 255, 0.06);
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.02);
        }
        .btn-danger {
            border-color: rgba(255, 50, 80, 0.08);
            color: #ff6b8a;
        }
        .btn-danger:hover {
            background: rgba(255, 50, 80, 0.04);
        }
        .btn-primary {
            border-color: rgba(0, 150, 255, 0.10);
            background: rgba(0, 100, 255, 0.04);
        }
        .btn-primary:hover {
            background: rgba(0, 100, 255, 0.08);
        }
        .btn-success {
            border-color: rgba(0, 255, 180, 0.06);
            color: #6ee7b7;
        }
        .btn-success:hover {
            background: rgba(0, 255, 180, 0.03);
        }
        .btn-purple {
            border-color: rgba(180, 0, 255, 0.06);
            color: #c084fc;
        }
        .btn-purple:hover {
            background: rgba(180, 0, 255, 0.03);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }
        .card {
            background: rgba(10, 10, 30, 0.5);
            border: 1px solid rgba(0, 150, 255, 0.04);
            border-radius: 18px;
            padding: 25px;
            backdrop-filter: blur(10px);
            transition: all 0.4s ease;
        }
        .card:hover {
            border-color: rgba(0, 150, 255, 0.07);
        }
        .card h3 {
            font-size: 12px;
            color: #ff6b8a;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(255, 50, 100, 0.04);
            font-weight: 700;
        }
        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 10, 30, 0.4);
            border: 1px solid rgba(0, 150, 255, 0.04);
            border-radius: 12px;
            color: #7ec8e3;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            transition: all 0.3s;
            margin-top: 6px;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.04);
            font-weight: 700;
        }
        .input-field:focus {
            outline: none;
            border-color: rgba(0, 200, 255, 0.12);
        }
        .input-field::placeholder {
            color: rgba(0, 200, 255, 0.06);
        }
        .flex-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .flex-row .btn {
            flex: 1;
            min-width: 70px;
            text-align: center;
        }

        /* PLAYER INFO CARD - HIGH CONTRAST */
        .info-card {
            background: linear-gradient(145deg, rgba(0, 20, 50, 0.85), rgba(10, 5, 20, 0.9));
            border: 1px solid rgba(0, 150, 255, 0.12);
            border-radius: 14px;
            padding: 20px;
            margin-top: 12px;
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.04), inset 0 0 60px rgba(0, 50, 150, 0.02);
        }
        .info-card .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 150, 255, 0.06);
        }
        .info-card .info-row:last-child {
            border-bottom: none;
        }
        .info-card .info-label {
            color: #ff6b8a;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 30px rgba(255, 50, 100, 0.08);
        }
        .info-card .info-value {
            color: #7ec8e3;
            font-size: 13px;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(0, 180, 255, 0.06);
            letter-spacing: 0.5px;
        }
        .info-card .info-value.highlight {
            color: #00d4ff;
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.12);
        }
        .info-card .info-value.gold {
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.08);
        }
        .info-empty {
            color: rgba(0, 200, 255, 0.12);
            font-size: 12px;
            text-align: center;
            padding: 30px 0;
            font-weight: 700;
        }

        /* LOGS */
        .logs-box {
            max-height: 120px;
            overflow-y: auto;
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            padding: 12px;
            font-size: 10px;
            color: rgba(0, 200, 255, 0.15);
            font-family: monospace;
            line-height: 1.8;
        }
        .logs-box .log-line {
            border-bottom: 1px solid rgba(0, 150, 255, 0.02);
            padding: 2px 0;
        }
        .logs-box .log-line .time {
            color: rgba(0, 200, 255, 0.06);
        }
        .logs-box .log-line .highlight {
            color: rgba(0, 200, 255, 0.30);
        }

        .vip-list {
            max-height: 100px;
            overflow-y: auto;
            margin-top: 10px;
        }
        .vip-list .item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid rgba(0, 150, 255, 0.02);
            font-size: 11px;
            color: rgba(0, 200, 255, 0.15);
        }
        .vip-list .item .id {
            color: rgba(0, 200, 255, 0.40);
        }
        .vip-list .item .del {
            color: rgba(255, 50, 80, 0.12);
            cursor: pointer;
        }
        .vip-list .item .del:hover {
            color: #ff6b8a;
        }

        #spamStatus {
            margin-top: 12px;
            font-size: 11px;
            color: rgba(0, 200, 255, 0.12);
        }
        #vipStatus {
            margin-top: 12px;
            font-size: 11px;
            color: rgba(0, 200, 255, 0.12);
        }

        /* FOOTER */
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
            padding: 15px;
            border-top: 1px solid rgba(0, 150, 255, 0.02);
            flex-wrap: wrap;
        }
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            color: rgba(0, 200, 255, 0.10);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-weight: 700;
        }
        .footer-links a:hover {
            color: rgba(255, 100, 130, 0.40);
        }
        .footer-links a .platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .footer-links a .platform-icon svg {
            width: 100%;
            height: 100%;
        }
        .footer-links .link-youtube:hover {
            border-color: rgba(255, 0, 0, 0.10);
            background: rgba(255, 0, 0, 0.02);
            color: #ff6b6b;
        }
        .footer-links .link-telegram:hover {
            border-color: rgba(0, 136, 204, 0.10);
            background: rgba(0, 136, 204, 0.02);
            color: #4fc3f7;
        }

        /* ===== TOAST ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
        }
        .toast-overlay.show { display: flex; }
        .toast-box {
            background: rgba(10, 10, 30, 0.95);
            border: 1px solid rgba(0, 150, 255, 0.08);
            border-radius: 24px;
            padding: 45px 55px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .toast-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 100, 255, 0.03), transparent, rgba(255, 50, 80, 0.03), transparent);
            animation: spinGlow 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .toast-box .toast-icon { font-size: 48px; margin-bottom: 15px; display: block; }
        .toast-box .toast-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #7ec8e3;
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 40px rgba(0, 200, 255, 0.06);
        }
        .toast-box .toast-message {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: rgba(0, 200, 255, 0.5);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .toast-box .toast-btn {
            padding: 12px 40px;
            background: rgba(0, 100, 255, 0.08);
            border: 1px solid rgba(0, 150, 255, 0.06);
            border-radius: 14px;
            color: #00d4ff;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            min-width: 120px;
        }
        .toast-box .toast-btn:hover {
            background: rgba(0, 100, 255, 0.12);
            box-shadow: 0 0 40px rgba(0, 100, 255, 0.03);
            transform: scale(1.02);
        }
        .toast-box.loading .toast-icon {
            animation: spinLoader 1s linear infinite;
        }
        @keyframes spinLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .toast-box.success .toast-title { color: #6ee7b7; }
        .toast-box.error .toast-title { color: #f472b6; }
        .toast-box.info .toast-title { color: #00d4ff; }

        @media (max-width:850px) {
            .grid-2 { grid-template-columns:1fr; }
            .header { flex-direction:column; gap:12px; text-align:center; }
            .header .user-actions { justify-content:center; }
        }
    </style>
</head>

                <span class="platform-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/></svg></span>

    <!-- TOAST -->
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box" id="toastBox">
            <span class="toast-icon" id="toastIcon">ℹ️</span>
            <div class="toast-title" id="toastTitle">تنبيه</div>
            <div class="toast-message" id="toastMessage">رسالة</div>
            <button class="toast-btn" onclick="closeToast()">OK</button>
        </div>

    <script>
        // ===== CANVAS PARTICLES =====
        (function() {
            var canvas = document.getElementById('bg-canvas');
            if (!canvas) return;
            var ctx = canvas.getContext('2d');
            var particles = [];
            var COUNT = 50;
            var CONN_DIST = 120;
            function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
            window.addEventListener('resize', resize);
            resize();
            var accent = '#00d4ff';
            function hexToRgba(hex, alpha) {
                var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
                return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
            }
            for (var i = 0; i < COUNT; i++) {
                particles.push({
                    x: Math.random() * canvas.width, y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.6, vy: (Math.random() - 0.5) * 0.6,
                    r: Math.random() * 2.5 + 1, alpha: Math.random() * 0.4 + 0.1
                });
            }
            var animId;
            function draw() {
                if (!canvas || !canvas.getContext) { if (animId) cancelAnimationFrame(animId); return; }
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (var i = 0; i < particles.length; i++) {
                    var p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = hexToRgba(accent, p.alpha);
                    ctx.fill();
                    for (var j = i + 1; j < particles.length; j++) {
                        var p2 = particles[j];
                        var dx = p.x - p2.x, dy = p.y - p2.y;
                        var dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONN_DIST) {
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.strokeStyle = hexToRgba(accent, (1 - dist / CONN_DIST) * 0.2);
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                animId = requestAnimationFrame(draw);
            }
            draw();
        })();

        // ===== TOAST =====
        function showToast(message, type, title, showOk) {
            type = type || 'info';
            title = title || '';
            showOk = (showOk !== undefined) ? showOk : true;
            var overlay = document.getElementById('toastOverlay');
            var icon = document.getElementById('toastIcon');
            var titleEl = document.getElementById('toastTitle');
            var msgEl = document.getElementById('toastMessage');
            var box = document.getElementById('toastBox');
            var btn = box.querySelector('.toast-btn');

            var icons = { success: '✅', error: '❌', info: 'ℹ️', loading: '⏳' };
            var titles = { success: title || 'نجاح', error: title || 'فشل', info: title || 'تنبيه', loading: title || 'جاري التنفيذ' };

            icon.textContent = icons[type] || 'ℹ️';
            titleEl.textContent = titles[type] || 'تنبيه';
            msgEl.textContent = message;
            box.className = 'toast-box ' + type;
            
            if (type === 'loading') {
                btn.style.display = 'none';
                box.classList.add('loading');
            } else {
                btn.style.display = 'inline-block';
                box.classList.remove('loading');
                if (!showOk) btn.style.display = 'none';
            }

            overlay.classList.add('show');
        }

        function closeToast() {
            document.getElementById('toastOverlay').classList.remove('show');
        }

        // ===== SPAM =====
        async function spamStart() {
            var uid = document.getElementById('targetUid').value.trim();
            if (!uid) { showToast('أدخل UID الهدف', 'error', '⚠️ تنبيه'); return; }
            showToast('جاري بدء السبام...', 'loading', '⏳ جاري التنفيذ');
            try {
                var res = await fetch('/api/spam/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                var data = await res.json();
                closeToast();
                if (data.status === 'success') {
                    showToast('تم بدء السبام على ' + uid, 'success', '✅ تم التنفيذ');
                    document.getElementById('spamStatus').textContent = '🟢 جاري السبام على ' + uid;
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { closeToast(); showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function spamStop() {
            var uid = document.getElementById('targetUid').value.trim();
            if (!uid) { showToast('أدخل UID', 'error', '⚠️ تنبيه'); return; }
            showToast('جاري إيقاف السبام...', 'loading', '⏳ جاري التنفيذ');
            try {
                var res = await fetch('/api/spam/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: uid })
                });
                var data = await res.json();
                closeToast();
                if (data.status === 'success') {
                    showToast('تم إيقاف السبام على ' + uid, 'info', '⏹ تم الإيقاف');
                    document.getElementById('spamStatus').textContent = '⚪ متوقف';
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { closeToast(); showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        // ===== VIP =====
        async function vipAdd() {
            var playerId = document.getElementById('vipPlayerId').value.trim();
            if (!playerId) { showToast('أدخل Player ID', 'error', '⚠️ تنبيه'); return; }
            showToast('جاري إضافة البوت...', 'loading', '⏳ جاري التنفيذ');
            try {
                var res = await fetch('/api/vip/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_id: playerId })
                });
                var data = await res.json();
                closeToast();
                if (data.status === 'success') {
                    showToast(data.message, 'success', '✅ تم التنفيذ');
                    document.getElementById('vipStatus').textContent = '✅ تم إضافة ' + playerId;
                    vipList();
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { closeToast(); showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function vipRemove() {
            var playerId = document.getElementById('vipPlayerId').value.trim();
            if (!playerId) { showToast('أدخل Player ID', 'error', '⚠️ تنبيه'); return; }
            showToast('جاري حذف البوت...', 'loading', '⏳ جاري التنفيذ');
            try {
                var res = await fetch('/api/vip/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ player_id: playerId })
                });
                var data = await res.json();
                closeToast();
                if (data.status === 'success') {
                    showToast(data.message, 'info', '✅ تم التنفيذ');
                    document.getElementById('vipStatus').textContent = '✅ تم حذف ' + playerId;
                    vipList();
                } else {
                    showToast(data.message || 'فشل', 'error', '❌ فشل');
                }
            } catch { closeToast(); showToast('خطأ في الاتصال', 'error', '❌ فشل'); }
        }

        async function vipList() {
            try {
                var res = await fetch('/api/vip/list');
                var data = await res.json();
                var container = document.getElementById('vipListContainer');
                if (data.count === 0) {
                    container.innerHTML = '<div style="color:rgba(0,200,255,0.06); font-size:11px;">لا يوجد بوتات VIP</div>';
                    return;
                }
                container.innerHTML = data.vips.map(function(v) {
                    return '<div class="item"><span class="id">👑 ' + v.player_id + '</span><span style="font-size:9px; color:rgba(0,200,255,0.06);">' + v.uid + '</span></div>';
                }).join('');
            } catch (e) { /* silent */ }
        }

        // ===== INFO (ALL DATA - FULL & ORGANIZED) =====
        async function getInfo() {
            var uid = document.getElementById('infoUid').value.trim();
            var container = document.getElementById('infoResult');
            if (!uid) { showToast('أدخل UID', 'error', '⚠️ تنبيه'); return; }
            
            showToast('جاري جلب المعلومات...', 'loading', '⏳ جاري التنفيذ');
            
            try {
                var res = await fetch('/api/info?uid=' + uid);
                var data = await res.json();
                closeToast();
                
                if (data.status === 'success' && data.data) {
                    var d = data.data;
                    
                    // استخراج البيانات من جميع الأقسام
                    var account = d.AccountInfo || {};
                    var guild = d.GuildInfo || {};
                    var captain = d.captainBasicInfo || {};
                    var credit = d.creditScoreInfo || {};
                    var pet = d.petInfo || {};
                    var social = d.socialinfo || {};
                    var profile = d.AccountProfileInfo || {};
                    var outfit = d.OutfitInfo || {};
                    
                    // دالة مساعدة للبحث عن قيمة
                    function getVal(obj, keys, defaultVal) {
                        defaultVal = defaultVal || 'N/A';
                        for (var i = 0; i < keys.length; i++) {
                            var key = keys[i];
                            if (obj[key] !== undefined && obj[key] !== null && obj[key] !== '') {
                                return obj[key];
                            }
                        }
                        return defaultVal;
                    }
                    
                    // تجميع جميع البيانات
                    var playerData = [
                        { label: '🆔 UID', value: getVal(captain, ['accountId']) || getVal(account, ['AccountId']) || uid, highlight: true },
                        { label: '👤 الاسم', value: getVal(captain, ['nickname']) || getVal(account, ['AccountName']) || 'غير معروف', highlight: true },
                        { label: '⭐ المستوى', value: getVal(captain, ['level']) || getVal(account, ['AccountLevel']) || 'N/A', gold: true },
                        { label: '📊 الخبرة', value: getVal(captain, ['exp']) || getVal(account, ['AccountEXP']) || 'N/A' },
                        { label: '🏆 الرتبة (BR)', value: getVal(captain, ['rank']) || getVal(account, ['BrMaxRank']) || 'N/A', gold: true },
                        { label: '🎯 نقاط BR', value: getVal(captain, ['rankingPoints']) || getVal(account, ['BrRankPoint']) || 'N/A' },
                        { label: '🏅 الرتبة (CS)', value: getVal(captain, ['csRank']) || getVal(account, ['CsMaxRank']) || 'N/A', gold: true },
                        { label: '🎯 نقاط CS', value: getVal(captain, ['csRankingPoints']) || getVal(account, ['CsRankPoint']) || 'N/A' },
                        { label: '🌍 السيرفر', value: getVal(captain, ['region']) || getVal(account, ['AccountRegion']) || 'N/A', highlight: true },
                        { label: '📱 الإصدار', value: getVal(captain, ['releaseVersion']) || getVal(account, ['ReleaseVersion']) || 'N/A' },
                        { label: '📅 الموسم', value: getVal(captain, ['seasonId']) || getVal(account, ['AccountSeasonId']) || 'N/A' },
                        { label: '❤️ الإعجابات', value: getVal(captain, ['liked']) || getVal(account, ['AccountLikes']) || 0 },
                        { label: '📛 البادجات', value: getVal(captain, ['badgeCnt']) || getVal(account, ['AccountBPBadges']) || 0 },
                        { label: '🏴 العشيرة', value: getVal(guild, ['GuildName']) || 'لا يوجد', highlight: true },
                        { label: '👥 أعضاء العشيرة', value: getVal(guild, ['GuildMember']) || 'N/A' },
                        { label: '🔰 مستوى العشيرة', value: getVal(guild, ['GuildLevel']) || 'N/A' },
                        { label: '💳 رصيد الائتمان', value: getVal(credit, ['creditScore']) || 'N/A', gold: true },
                        { label: '🐾 اسم البت', value: getVal(pet, ['id']) ? 'ID: ' + pet.id : 'لا يوجد' },
                        { label: '🐾 مستوى البت', value: getVal(pet, ['level']) || 'N/A' },
                        { label: '🌐 اللغة', value: getVal(social, ['language']) || 'N/A' },
                        { label: '📅 تاريخ الإنشاء', value: getVal(captain, ['createAt']) ? new Date(parseInt(getVal(captain, ['createAt'])) * 1000).toLocaleDateString('ar') : getVal(account, ['AccountCreateTime']) ? new Date(parseInt(getVal(account, ['AccountCreateTime'])) * 1000).toLocaleDateString('ar') : 'N/A' },
                        { label: '🕒 آخر ظهور', value: getVal(captain, ['lastLoginAt']) ? new Date(parseInt(getVal(captain, ['lastLoginAt'])) * 1000).toLocaleDateString('ar') + ' ' + new Date(parseInt(getVal(captain, ['lastLoginAt'])) * 1000).toLocaleTimeString('ar') : getVal(account, ['AccountLastLogin']) ? new Date(parseInt(getVal(account, ['AccountLastLogin'])) * 1000).toLocaleDateString('ar') : 'N/A' },
                    ];
                    
                    var html = '<div class="info-card">';
                    var hasData = false;
                    
                    for (var i = 0; i < playerData.length; i++) {
                        var item = playerData[i];
                        if (item.value !== undefined && item.value !== null && item.value !== '' && item.value !== 'N/A' && item.value !== 'غير معروف' && item.value !== 'غير محدد' && item.value !== 'لا يوجد') {
                            var cls = 'info-value';
                            if (item.highlight) cls += ' highlight';
                            if (item.gold) cls += ' gold';
                            html += '<div class="info-row">';
                            html += '<span class="info-label">' + item.label + '</span>';
                            html += '<span class="' + cls + '">' + item.value + '</span>';
                            html += '</div>';
                            hasData = true;
                        }
                    }
                    
                    // عرض المعدات إذا وجدت
                    if (profile.EquippedOutfit && profile.EquippedOutfit.length > 0) {
                        html += '<div class="info-row"><span class="info-label">🎽 المعدات</span><span class="info-value">' + profile.EquippedOutfit.join(', ') + '</span></div>';
                        hasData = true;
                    }
                    
                    // عرض المهارات إذا وجدت
                    if (profile.EquippedSkills && profile.EquippedSkills.length > 0) {
                        var skills = [];
                        for (var s = 0; s < profile.EquippedSkills.length; s += 3) {
                            if (s + 2 < profile.EquippedSkills.length) {
                                skills.push('Slot' + profile.EquippedSkills[s+1] + ': ' + profile.EquippedSkills[s]);
                            }
                        }
                        if (skills.length > 0) {
                            html += '<div class="info-row"><span class="info-label">⚔️ المهارات</span><span class="info-value">' + skills.join(' | ') + '</span></div>';
                            hasData = true;
                        }
                    }
                    
                    // عرض البنر والأفاتار
                    var banner = getVal(captain, ['bannerId']) || getVal(account, ['AccountBannerId']);
                    var avatar = getVal(captain, ['headPic']) || getVal(account, ['AccountAvatarId']);
                    if (banner !== 'N/A' || avatar !== 'N/A') {
                        html += '<div class="info-row"><span class="info-label">🖼️ البنر</span><span class="info-value">' + banner + '</span></div>';
                        html += '<div class="info-row"><span class="info-label">🖼️ الأفاتار</span><span class="info-value">' + avatar + '</span></div>';
                        hasData = true;
                    }
                    
                    // عرض البيانات الخام إذا لم يتم العثور على شيء
                    if (!hasData) {
                        html += '<div class="info-row"><span class="info-label">📦 البيانات الخام</span></div>';
                        for (var k in d) {
                            if (d[k] !== null && d[k] !== undefined && d[k] !== '') {
                                html += '<div class="info-row">';
                                html += '<span class="info-label" style="font-size:10px;">' + k + '</span>';
                                html += '<span class="info-value" style="font-size:11px;">' + JSON.stringify(d[k]) + '</span>';
                                html += '</div>';
                            }
                        }
                    }
                    
                    html += '</div>';
                    container.innerHTML = html;
                    showToast('تم جلب معلومات ' + uid, 'success', '✅ نجاح');
                } else {
                    container.innerHTML = '<div class="info-empty">⚠️ ' + (data.message || 'لم يتم العثور على اللاعب') + '</div>';
                    showToast(data.message || 'لم يتم العثور على اللاعب', 'error', '❌ فشل');
                }
            } catch (e) {
                closeToast();
                container.innerHTML = '<div class="info-empty">❌ خطأ في الاتصال بالخادم</div>';
                showToast('خطأ في الاتصال', 'error', '❌ فشل');
            }
        }

        // ===== LOGS =====
        async function loadLogs() {
            var container = document.getElementById('logsContent');
            try {
                var res = await fetch('/api/user/logs');
                var data = await res.json();
                if (data.logs && data.logs.length > 0) {
                    container.innerHTML = data.logs.map(function(l) {
                        return '<div class="log-line">' + l + '</div>';
                    }).join('');
                } else {
                    container.innerHTML = '<div class="log-line"><span class="time">[System]</span> <span class="highlight">لا توجد سجلات</span></div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="log-line"><span class="time">[Error]</span> فشل التحميل</div>';
            }
        }

        // ===== LOGOUT =====
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }

        // ===== INIT =====
        loadLogs();
        vipList();
        setInterval(loadLogs, 30000);
    </script>
