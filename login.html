<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F7M Bot Manager · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0618;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(70, 0, 200, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0, 100, 255, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 100%, rgba(100, 0, 200, 0.08) 0%, transparent 50%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, rgba(120, 80, 255, 0.15), transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(0, 150, 255, 0.1), transparent),
                radial-gradient(2px 2px at 50px 160px, rgba(150, 50, 255, 0.12), transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(0, 200, 255, 0.08), transparent),
                radial-gradient(2px 2px at 130px 80px, rgba(100, 50, 255, 0.1), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            animation: floatParticles 30s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes floatParticles {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        .login-box {
            background: rgba(10, 6, 30, 0.75);
            border: 1px solid rgba(120, 80, 255, 0.12);
            border-radius: 24px;
            padding: 45px 40px;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(80, 50, 200, 0.05);
            position: relative;
            overflow: hidden;
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(100, 50, 255, 0.03), transparent, rgba(0, 150, 255, 0.03), transparent);
            animation: spinGlow 25s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes spinGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-box .logo h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(135deg, #a78bfa, #6366f1, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 60px rgba(100, 50, 255, 0.15);
        }
        .login-box .logo .sub {
            font-size: 11px;
            color: rgba(167, 139, 250, 0.2);
            letter-spacing: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .login-box .logo .sub span {
            color: rgba(167, 139, 250, 0.3);
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: rgba(167, 139, 250, 0.25);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .form-group input {
            width: 100%;
            padding: 16px 18px;
            background: rgba(20, 10, 50, 0.5);
            border: 1px solid rgba(120, 80, 255, 0.08);
            border-radius: 14px;
            color: #c4b5fd;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            transition: all 0.4s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: rgba(120, 80, 255, 0.25);
            box-shadow: 0 0 50px rgba(100, 50, 255, 0.05), inset 0 0 50px rgba(100, 50, 255, 0.02);
        }
        .form-group input::placeholder {
            color: rgba(167, 139, 250, 0.1);
            font-size: 12px;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, rgba(100, 50, 255, 0.12), rgba(59, 130, 246, 0.05));
            border: 1px solid rgba(120, 80, 255, 0.15);
            border-radius: 14px;
            color: #a78bfa;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: rgba(100, 50, 255, 0.18);
            box-shadow: 0 0 60px rgba(100, 50, 255, 0.08);
            transform: translateY(-2px);
        }
        .login-btn:active { transform: translateY(0px); }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid transparent;
            color: rgba(167, 139, 250, 0.15);
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        .footer-links a:hover {
            color: rgba(167, 139, 250, 0.5);
        }
        .footer-links a .platform-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
        }
        .footer-links a .platform-icon svg {
            width: 100%;
            height: 100%;
        }
        .footer-links .link-youtube:hover {
            border-color: rgba(255, 0, 0, 0.15);
            background: rgba(255, 0, 0, 0.04);
            color: #ff6b6b;
        }
        .footer-links .link-telegram:hover {
            border-color: rgba(0, 136, 204, 0.15);
            background: rgba(0, 136, 204, 0.04);
            color: #4fc3f7;
        }

        /* ===== LARGE TOAST ===== */
        .toast-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 99999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeInOverlay 0.3s ease;
        }
        .toast-overlay.show { display: flex; }
        @keyframes fadeInOverlay {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }
        .toast-box {
            background: rgba(10, 6, 30, 0.95);
            border: 1px solid rgba(120, 80, 255, 0.15);
            border-radius: 24px;
            padding: 45px 55px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }
        .toast-box::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(100, 50, 255, 0.03), transparent, rgba(0, 150, 255, 0.03), transparent);
            animation: spinGlow 15s linear infinite;
            pointer-events: none;
            z-index: -1;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.85) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .toast-box .toast-icon { font-size: 48px; margin-bottom: 15px; display: block; }
        .toast-box .toast-title {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            font-weight: 700;
            color: #c4b5fd;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .toast-box .toast-message {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            color: rgba(167, 139, 250, 0.6);
            margin-bottom: 25px;
            line-height: 1.6;
        }
        .toast-box .toast-btn {
            padding: 12px 40px;
            background: rgba(120, 80, 255, 0.08);
            border: 1px solid rgba(120, 80, 255, 0.15);
            border-radius: 14px;
            color: #a78bfa;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            min-width: 120px;
        }
        .toast-box .toast-btn:hover {
            background: rgba(120, 80, 255, 0.15);
            box-shadow: 0 0 40px rgba(100, 50, 255, 0.05);
            transform: scale(1.02);
        }
        .toast-box.success .toast-title { color: #6ee7b7; }
        .toast-box.success .toast-icon { filter: drop-shadow(0 0 30px rgba(0, 255, 180, 0.15)); }
        .toast-box.error .toast-title { color: #f472b6; }
        .toast-box.error .toast-icon { filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.15)); }
        .toast-box.info .toast-title { color: #a78bfa; }
        .toast-box.info .toast-icon { filter: drop-shadow(0 0 30px rgba(120, 80, 255, 0.15)); }
    </style>
</head>
<body>

        <div class="login-box">

                            <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/>

    <!-- TOAST OVERLAY -->
    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box" id="toastBox">
            <span class="toast-icon" id="toastIcon">ℹ️</span>
            <div class="toast-title" id="toastTitle">تنبيه</div>
            <div class="toast-message" id="toastMessage">رسالة</div>
            <button class="toast-btn" onclick="closeToast()">OK</button>
        </div>
    </div>

    <script>
        // ===== LARGE TOAST =====
        function showToast(message, type = 'info', title = '') {
            const overlay = document.getElementById('toastOverlay');
            const icon = document.getElementById('toastIcon');
            const titleEl = document.getElementById('toastTitle');
            const msgEl = document.getElementById('toastMessage');
            const box = document.getElementById('toastBox');

            const icons = { success: '✅', error: '❌', info: 'ℹ️' };
            const titles = { success: title || 'نجاح', error: title || 'فشل', info: title || 'تنبيه' };

            icon.textContent = icons[type] || 'ℹ️';
            titleEl.textContent = titles[type] || 'تنبيه';
            msgEl.textContent = message;
            box.className = 'toast-box ' + type;

            overlay.classList.add('show');
        }

        function closeToast() {
            document.getElementById('toastOverlay').classList.remove('show');
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeToast();
        });

        // ===== LOGIN =====
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showToast('يرجى ملء جميع الحقول', 'error', '⚠️ تنبيه');
                return;
            }

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/';
                } else {
                    showToast(data.error || 'المستخدم غير موجود', 'error', '❌ فشل الدخول');
                }
            } catch (err) {
                showToast('خطأ في الاتصال بالخادم', 'error', '❌ فشل الدخول');
            }
        });
    </script>
