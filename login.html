<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMINE Bot Manager · Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #e8f0fe;
            background-image: 
                radial-gradient(ellipse at 20% 30%, rgba(59, 130, 246, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(99, 102, 241, 0.05) 0%, transparent 60%);
        }
        .login-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 20px;
        }
        .login-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.04);
        }
        .login-box .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .login-box .logo h1 {
            font-size: 28px;
            font-weight: 900;
            color: #1a2a4a;
            letter-spacing: 2px;
        }
        .login-box .logo h1 span {
            color: #3b82f6;
        }
        .login-box .logo .sub {
            font-size: 11px;
            color: #94a3b8;
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 700;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            color: #1a2a4a;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.08);
        }
        .form-group input::placeholder {
            color: #94a3b8;
            font-size: 12px;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #3b82f6;
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(59, 130, 246, 0.3);
        }
        .login-btn:active { transform: translateY(0px); }
        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .footer-links a {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 20px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-weight: 700;
        }
        .footer-links a:hover { color: #1a2a4a; }
        .footer-links a .platform-icon { display:flex; align-items:center; justify-content:center; width:16px; height:16px; }
        .footer-links a .platform-icon svg { width:100%; height:100%; }

        /* TOAST */
        .toast-overlay {
            position: fixed; top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.5); backdrop-filter:blur(6px);
            z-index:99999; display:none; justify-content:center; align-items:center;
        }
        .toast-overlay.show { display:flex; }
        .toast-box {
            background: #ffffff; border-radius:20px; padding:40px 50px;
            max-width:420px; width:90%; text-align:center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            0% { opacity:0; transform:scale(0.9) translateY(10px); }
            100% { opacity:1; transform:scale(1) translateY(0); }
        }
        .toast-box .toast-icon { font-size:44px; margin-bottom:12px; display:block; }
        .toast-box .toast-title { font-size:20px; font-weight:700; color:#1a2a4a; margin-bottom:8px; }
        .toast-box .toast-message { font-size:15px; color:#64748b; margin-bottom:20px; line-height:1.6; }
        .toast-box .toast-btn {
            padding:10px 40px; background:#3b82f6; border:none; border-radius:12px;
            color:#fff; font-family:'Orbitron',monospace; font-size:13px; font-weight:700;
            cursor:pointer; transition:all 0.3s; letter-spacing:1px;
        }
        .toast-box .toast-btn:hover { background:#2563eb; }
        .toast-box.success .toast-title { color:#16a34a; }
        .toast-box.error .toast-title { color:#dc2626; }
        .toast-box.info .toast-title { color:#3b82f6; }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="logo">
                <h1>⚡ AMINE</h1>
                <div class="sub">نظام إدارة البوتات الذكي · v.ω.18</div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>👤 اسم المستخدم</label>
                    <input type="text" id="username" placeholder="أدخل اسم المستخدم">
                </div>
                <div class="form-group">
                    <label>🔑 كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">🚀 دخول</button>
            </form>
            <div class="footer-links">
                <a href="https://youtube.com/@stravexgm?si=JfbKlk1iBUGhR4l4" target="_blank">
                    <span class="platform-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z" fill="#FF0000"/><path d="M9.545 15.568V8.432L15.818 12l-6.273 3.568z" fill="white"/></svg></span>
                    YouTube
                </a>
                <a href="https://t.me/xAMiNE_Core" target="_blank">
                    <span class="platform-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/></svg></span>
                    AMINE Core
                </a>
                <a href="https://t.me/stravex_oficiel" target="_blank">
                    <span class="platform-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z" fill="#0088cc"/></svg></span>
                    STRAVEX
                </a>
            </div>
        </div>
    </div>

    <div class="toast-overlay" id="toastOverlay">
        <div class="toast-box" id="toastBox">
            <span class="toast-icon" id="toastIcon">ℹ️</span>
            <div class="toast-title" id="toastTitle">تنبيه</div>
            <div class="toast-message" id="toastMessage">رسالة</div>
            <button class="toast-btn" onclick="closeToast()">OK</button>
        </div>
    </div>

    <script>
        function showToast(message, type='info', title='') {
            const o=document.getElementById('toastOverlay'), icon=document.getElementById('toastIcon');
            const t=document.getElementById('toastTitle'), msg=document.getElementById('toastMessage');
            const box=document.getElementById('toastBox');
            const icons={success:'✅',error:'❌',info:'ℹ️'};
            const titles={success:title||'نجاح',error:title||'فشل',info:title||'تنبيه'};
            icon.textContent=icons[type]||'ℹ️';
            t.textContent=titles[type]||'تنبيه';
            msg.textContent=message;
            box.className='toast-box '+type;
            o.classList.add('show');
        }
        function closeToast(){ document.getElementById('toastOverlay').classList.remove('show'); }
        document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeToast(); });

        document.getElementById('loginForm').addEventListener('submit', async(e)=>{
            e.preventDefault();
            const u=document.getElementById('username').value.trim();
            const p=document.getElementById('password').value.trim();
            if(!u||!p){ showToast('يرجى ملء جميع الحقول','error','⚠️ تنبيه'); return; }
            try{
                const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
                const data=await res.json();
                if(res.ok){ window.location.href='/'; }
                else{ showToast(data.error||'المستخدم غير موجود','error','❌ فشل الدخول'); }
            }catch{ showToast('خطأ في الاتصال بالخادم','error','❌ فشل الدخول'); }
        });
    </script>
</body>
</html>
